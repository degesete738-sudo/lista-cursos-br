<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capa BOY STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:2rem 1rem;font-family:'Barlow Condensed',sans-serif;gap:1.5rem}

/* CONTROLS */
.controls{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;width:100%;max-width:540px}
.upload-btn{background:#C4956A;color:#0A0A0A;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;padding:.6rem 1rem;cursor:pointer;border:none;flex:1;min-width:120px;text-align:center}
.upload-btn input{display:none}
.download-btn{background:#F5F3EE;color:#0A0A0A;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:.75rem 2rem;border:none;cursor:pointer;width:100%;max-width:540px}
.download-btn:hover{background:#C4956A}
.hint{color:rgba(255,255,255,.35);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;text-align:center}

/* CANVAS WRAPPER */
.canvas-wrap{position:relative;width:540px;height:540px;flex-shrink:0}

/* CAPA */
#capa{
  width:540px;
  height:540px;
  background:#0A0A0A;
  position:relative;
  overflow:hidden;
}

/* GRID DE FOTOS 2x2 */
.foto-grid{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px;
}
.foto-slot{
  position:relative;
  overflow:hidden;
  background:#1A1A1A;
  cursor:pointer;
}
.foto-slot img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  filter:brightness(.75) contrast(1.08) saturate(.9);
}
.foto-slot .placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.4rem;color:rgba(255,255,255,.15);
  font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
}
.foto-slot .placeholder span{font-size:1.5rem;opacity:.3}

/* OVERLAY DEGRADÊ */
.overlay{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(10,10,10,.55) 20%, transparent 75%),
    linear-gradient(to bottom, rgba(10,10,10,.3) 0%, transparent 30%, transparent 60%, rgba(10,10,10,.5) 100%);
  pointer-events:none;
}

/* BORDA MADEIRA */
.wood-border{
  position:absolute;inset:0;
  border:3px solid rgba(196,149,106,.5);
  pointer-events:none;
  z-index:5;
}
.wood-border::before{
  content:'';
  position:absolute;inset:6px;
  border:1px solid rgba(196,149,106,.2);
}

/* CENTRO — LOGO */
.center-logo{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  pointer-events:none;
}
.logo-box{
  background:rgba(8,8,8,.82);
  backdrop-filter:blur(8px);
  border:1px solid rgba(196,149,106,.45);
  padding:1rem 2rem;
  text-align:center;
  position:relative;
}
.logo-box::before{
  content:'';
  position:absolute;
  top:-5px;left:-5px;right:-5px;bottom:-5px;
  border:1px solid rgba(196,149,106,.15);
}
.logo-line-top{
  width:60px;height:1px;
  background:linear-gradient(90deg,transparent,#C4956A,transparent);
  margin:0 auto .6rem;
}
.logo-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:3.8rem;
  letter-spacing:.25em;
  line-height:.85;
  color:#F5F3EE;
}
.logo-name em{color:#C4956A;font-style:normal}
.logo-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.55rem;
  letter-spacing:.5em;
  text-transform:uppercase;
  color:#C4956A;
  margin-top:.4rem;
  opacity:.9;
}
.logo-line-bot{
  width:60px;height:1px;
  background:linear-gradient(90deg,transparent,#C4956A,transparent);
  margin:.5rem auto 0;
}

/* CANTOS decorativos */
.corner{position:absolute;width:18px;height:18px;z-index:6;pointer-events:none}
.corner-tl{top:14px;left:14px;border-top:2px solid #C4956A;border-left:2px solid #C4956A}
.corner-tr{top:14px;right:14px;border-top:2px solid #C4956A;border-right:2px solid #C4956A}
.corner-bl{bottom:14px;left:14px;border-bottom:2px solid #C4956A;border-left:2px solid #C4956A}
.corner-br{bottom:14px;right:14px;border-bottom:2px solid #C4956A;border-right:2px solid #C4956A}

/* TAG */
.tag-sp{
  position:absolute;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Barlow Condensed',sans-serif;
  font-size:.5rem;
  letter-spacing:.35em;
  text-transform:uppercase;
  color:rgba(196,149,106,.7);
  z-index:10;
  pointer-events:none;
  white-space:nowrap;
}

@media(max-width:580px){
  .canvas-wrap,#capa{width:360px;height:360px}
  .logo-name{font-size:2.8rem}
  .controls{max-width:360px}
  .download-btn{max-width:360px}
}
</style>
</head>
<body>

<div class="hint">▲ Carrega as fotos nos 4 quadrantes — clica em cada um</div>

<!-- CAPA -->
<div class="canvas-wrap">
  <div id="capa">

    <!-- GRID 2x2 -->
    <div class="foto-grid">
      <div class="foto-slot" id="s1" onclick="document.getElementById('f1').click()">
        <div class="placeholder"><span>＋</span>Foto 1</div>
        <input type="file" id="f1" accept="image/*" style="display:none" onchange="loadImg(this,'s1')">
      </div>
      <div class="foto-slot" id="s2" onclick="document.getElementById('f2').click()">
        <div class="placeholder"><span>＋</span>Foto 2</div>
        <input type="file" id="f2" accept="image/*" style="display:none" onchange="loadImg(this,'s2')">
      </div>
      <div class="foto-slot" id="s3" onclick="document.getElementById('f3').click()">
        <div class="placeholder"><span>＋</span>Foto 3</div>
        <input type="file" id="f3" accept="image/*" style="display:none" onchange="loadImg(this,'s3')">
      </div>
      <div class="foto-slot" id="s4" onclick="document.getElementById('f4').click()">
        <div class="placeholder"><span>＋</span>Foto 4</div>
        <input type="file" id="f4" accept="image/*" style="display:none" onchange="loadImg(this,'s4')">
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- BORDA -->
    <div class="wood-border"></div>

    <!-- CANTOS -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- LOGO CENTRAL -->
    <div class="center-logo">
      <div class="logo-box">
        <div class="logo-line-top"></div>
        <div class="logo-name"><em>BOY</em><br>STORE</div>
        <div class="logo-sub">Estilo &amp; Atitude — SP</div>
        <div class="logo-line-bot"></div>
      </div>
    </div>

    <!-- TAG RODAPÉ -->
    <div class="tag-sp">São Paulo · Brasil · Moda Premium</div>

  </div>
</div>

<!-- BOTÃO DOWNLOAD -->
<button class="download-btn" onclick="baixar()">⬇ Baixar Capa (PNG)</button>

<div class="hint">A imagem é gerada em alta resolução para o Instagram</div>

<script>
function loadImg(input, slotId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const slot = document.getElementById(slotId);
    slot.querySelector('.placeholder').style.display = 'none';
    let img = slot.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      slot.appendChild(img);
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function baixar() {
  const btn = document.querySelector('.download-btn');
  btn.textContent = '⏳ Gerando imagem...';
  html2canvas(document.getElementById('capa'), {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#0A0A0A'
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'capa-boy-store.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '⬇ Baixar Capa (PNG)';
  });
}
</script>
</body>
</html>
