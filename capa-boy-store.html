<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capa BOY STORE — Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d0d0d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:1.5rem 1rem 3rem;
  gap:1.2rem;
  font-family:'Barlow Condensed',sans-serif;
}

.page-title{
  color:rgba(255,255,255,.4);
  font-size:.6rem;
  letter-spacing:.4em;
  text-transform:uppercase;
  text-align:center;
}

/* ─── STORY CARD ─── */
#story{
  width:360px;
  height:640px;
  background:#0A0A0A;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  box-shadow:0 0 60px rgba(0,0,0,.8);
}

/* ─── FOTOS ─── */
/* Foto 1 — topo esquerda grande */
.f1{position:absolute;top:0;left:0;width:180px;height:288px;}
/* Foto 2 — topo direita grande */
.f2{position:absolute;top:0;left:180px;width:180px;height:288px;}
/* Foto 3 — baixo esquerda */
.f3{position:absolute;top:352px;left:0;width:180px;height:288px;}
/* Foto 4 — baixo direita */
.f4{position:absolute;top:352px;left:180px;width:180px;height:288px;}

.foto-slot{
  cursor:pointer;
  overflow:hidden;
  background:#1a1a1a;
}
.foto-slot img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  filter:brightness(.78) contrast(1.1) saturate(.85);
}
.foto-slot .ph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:.3rem;
  color:rgba(196,149,106,.4);
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  transition:opacity .2s;
}
.foto-slot .ph svg{width:22px;opacity:.4}
.foto-slot:hover .ph{opacity:.7}
.foto-slot input{display:none}

/* ─── FAIXA CENTRAL ─── */
.faixa{
  position:absolute;
  top:265px;left:0;right:0;
  height:110px;
  background:linear-gradient(135deg,#0A0A0A 0%,#1a1511 50%,#0A0A0A 100%);
  border-top:1px solid rgba(196,149,106,.5);
  border-bottom:1px solid rgba(196,149,106,.5);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:.1rem;
  z-index:20;
}
.faixa-linha{
  width:80px;height:1px;
  background:linear-gradient(90deg,transparent,#C4956A,transparent);
  margin:.25rem auto;
}
.brand-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:3.6rem;
  letter-spacing:.3em;
  color:#F5F3EE;
  line-height:1;
}
.brand-name em{color:#C4956A;font-style:normal}
.brand-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.52rem;
  letter-spacing:.55em;
  text-transform:uppercase;
  color:rgba(196,149,106,.75);
}

/* ─── OVERLAYS degradê nas fotos ─── */
.grad-top{
  position:absolute;top:0;left:0;right:0;
  height:288px;
  background:
    linear-gradient(to bottom, rgba(10,10,10,.15) 0%, rgba(10,10,10,.0) 60%, rgba(10,10,10,.55) 100%);
  z-index:5;pointer-events:none;
}
.grad-bot{
  position:absolute;top:352px;left:0;right:0;
  height:288px;
  background:
    linear-gradient(to top, rgba(10,10,10,.2) 0%, rgba(10,10,10,.0) 60%, rgba(10,10,10,.55) 100%);
  z-index:5;pointer-events:none;
}

/* ─── SEPARADOR VERTICAL ─── */
.sep-v-top{
  position:absolute;top:0;left:179px;
  width:2px;height:265px;
  background:linear-gradient(to bottom,transparent,rgba(196,149,106,.4),transparent);
  z-index:6;pointer-events:none;
}
.sep-v-bot{
  position:absolute;top:375px;left:179px;
  width:2px;height:265px;
  background:linear-gradient(to bottom,transparent,rgba(196,149,106,.4),transparent);
  z-index:6;pointer-events:none;
}

/* ─── CANTOS ─── */
.corner{position:absolute;width:16px;height:16px;z-index:25;pointer-events:none}
.c-tl{top:10px;left:10px;border-top:2px solid #C4956A;border-left:2px solid #C4956A}
.c-tr{top:10px;right:10px;border-top:2px solid #C4956A;border-right:2px solid #C4956A}
.c-bl{bottom:10px;left:10px;border-bottom:2px solid #C4956A;border-left:2px solid #C4956A}
.c-br{bottom:10px;right:10px;border-bottom:2px solid #C4956A;border-right:2px solid #C4956A}

/* ─── BORDA EXTERNA ─── */
.borda{
  position:absolute;inset:5px;
  border:1px solid rgba(196,149,106,.25);
  z-index:24;pointer-events:none;
}

/* ─── TAG RODAPÉ ─── */
.tag-base{
  position:absolute;
  bottom:16px;left:0;right:0;
  text-align:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:.45rem;letter-spacing:.4em;
  text-transform:uppercase;
  color:rgba(196,149,106,.5);
  z-index:25;pointer-events:none;
}

/* ─── BOTÃO DOWNLOAD ─── */
.btn-dl{
  width:360px;
  padding:.85rem;
  background:#C4956A;
  color:#0A0A0A;
  font-family:'Barlow Condensed',sans-serif;
  font-size:.75rem;letter-spacing:.25em;
  text-transform:uppercase;font-weight:700;
  border:none;cursor:pointer;
  transition:background .2s;
}
.btn-dl:hover{background:#A07850;color:#F5F3EE}

.dica{
  color:rgba(255,255,255,.25);
  font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;
  text-align:center;
  max-width:360px;
  line-height:1.6;
}
</style>
</head>
<body>

<div class="page-title">✦ Capa Instagram Stories — BOY STORE ✦</div>

<!-- ════ STORY ════ -->
<div id="story">

  <!-- FOTOS -->
  <div class="foto-slot f1" id="s1" onclick="pick(1)">
    <div class="ph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M3 9h2M19 9h2"/></svg>
      Foto 1
    </div>
    <input type="file" id="f1" accept="image/*" onchange="loadImg(1,this)">
  </div>

  <div class="foto-slot f2" id="s2" onclick="pick(2)">
    <div class="ph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M3 9h2M19 9h2"/></svg>
      Foto 2
    </div>
    <input type="file" id="f2" accept="image/*" onchange="loadImg(2,this)">
  </div>

  <div class="foto-slot f3" id="s3" onclick="pick(3)">
    <div class="ph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M3 9h2M19 9h2"/></svg>
      Foto 3
    </div>
    <input type="file" id="f3" accept="image/*" onchange="loadImg(3,this)">
  </div>

  <div class="foto-slot f4" id="s4" onclick="pick(4)">
    <div class="ph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M3 9h2M19 9h2"/></svg>
      Foto 4
    </div>
    <input type="file" id="f4" accept="image/*" onchange="loadImg(4,this)">
  </div>

  <!-- OVERLAYS -->
  <div class="grad-top"></div>
  <div class="grad-bot"></div>
  <div class="sep-v-top"></div>
  <div class="sep-v-bot"></div>

  <!-- FAIXA CENTRAL -->
  <div class="faixa">
    <div class="faixa-linha"></div>
    <div class="brand-name"><em>BOY</em> STORE</div>
    <div class="brand-sub">Estilo &amp; Atitude — São Paulo</div>
    <div class="faixa-linha"></div>
  </div>

  <!-- DECORAÇÃO -->
  <div class="borda"></div>
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>
  <div class="tag-base">@boystore · moda premium · brasil</div>

</div>
<!-- ════ FIM STORY ════ -->

<button class="btn-dl" id="btnDl" onclick="baixar()">⬇ Baixar Stories (1080 × 1920)</button>

<div class="dica">
  Clica em cada quadrante para adicionar a foto.<br>
  Depois clica em baixar para salvar em alta resolução.
</div>

<script>
function pick(n){ document.getElementById('f'+n).click() }

function loadImg(n, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const slot = document.getElementById('s'+n);
    slot.querySelector('.ph').style.display = 'none';
    let img = slot.querySelector('img');
    if(!img){
      img = document.createElement('img');
      slot.appendChild(img);
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function baixar(){
  const btn = document.getElementById('btnDl');
  btn.textContent = '⏳ Gerando... aguarda';
  btn.disabled = true;

  // Esconde os placeholders antes de capturar
  document.querySelectorAll('.ph').forEach(p => p.style.visibility='hidden');

  html2canvas(document.getElementById('story'),{
    scale: 3,           // 360×3 = 1080px / 640×3 = 1920px
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#0A0A0A',
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'boy-store-stories.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '⬇ Baixar Stories (1080 × 1920)';
    btn.disabled = false;
    document.querySelectorAll('.ph').forEach(p => p.style.visibility='');
  });
}
</script>
</body>
</html>
